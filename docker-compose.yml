version: '3.8'

# 栖缘社 Docker Compose 部署配置

services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: lingtong_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lingtong_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lingtong_match}
      MYSQL_USER: ${MYSQL_USER:-lingtong}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lingtong_pass_2024}
      TZ: Asia/Shanghai
    volumes:
      # 数据卷挂载
      - mysql_data:/var/lib/mysql
      # 初始化脚本
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # 自定义配置文件
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - lingtong_network
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-authentication-plugin=mysql_native_password',
      '--max_connections=500',
      '--max_allowed_packet=64M'
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: lingtong_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-lingtong_redis_2024}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - lingtong_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lingtong_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.25

  # ============ 后端 API 服务 ============
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingtong_api
    restart: unless-stopped
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-lingtong}
      DB_PASSWORD: ${MYSQL_PASSWORD:-lingtong_pass_2024}
      DB_DATABASE: ${MYSQL_DATABASE:-lingtong_match}
      DB_SYNC: ${DB_SYNC:-false}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-lingtong_redis_2024}
      REDIS_DB: 0
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # 微信配置
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      # 微信支付配置
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_API_V3_KEY: ${WECHAT_API_V3_KEY:-}
      WECHAT_CERT_PATH: /app/certs/apiclient_cert.pem
      WECHAT_KEY_PATH: /app/certs/apiclient_key.pem
      # 腾讯云配置
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
      # 服务端口
      PORT: 3000
      NODE_ENV: production
    volumes:
      # 上传文件目录
      - api_uploads:/app/uploads
      # 日志目录
      - api_logs:/app/logs
      # 支付证书目录
      - ./certs:/app/certs:ro
    ports:
      - "3000:3000"
    networks:
      - lingtong_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    cpus: 0.5

  # ============ 管理后台 ============
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: lingtong_admin
    restart: unless-stopped
    volumes:
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    networks:
      - lingtong_network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.25

  # ============ Nginx 反向代理（可选，用于生产环境） ============
  nginx:
    image: nginx:alpine
    container_name: lingtong_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lingtong_network
    depends_on:
      - api
      - admin
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 64m
    cpus: 0.25

# ============ 数据卷定义 ============
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local

# ============ 网络定义 ============
networks:
  lingtong_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
